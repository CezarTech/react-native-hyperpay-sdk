buildscript {
    if (project == rootProject) {
        repositories {
            google()
            mavenCentral()
        }

        dependencies {
            classpath 'com.android.tools.build:gradle:8.8.2'
        }
    }
}

apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    namespace "com.reactnativehyperpay"
    compileSdkVersion safeExtGet('HyperPay_compileSdkVersion', 35)
    defaultConfig {
        minSdkVersion safeExtGet('HyperPay_minSdkVersion', 24)
        targetSdkVersion safeExtGet('HyperPay_targetSdkVersion', 35)
        versionCode 1
        versionName "7.11.0"

    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    lintOptions {
        disable 'GradleCompatible'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    mavenLocal()
    flatDir {
        dirs 'libs'
    }
    maven {
        // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
        url("$rootDir/../node_modules/react-native/android")
    }
    google()
    mavenCentral()
}

dependencies {

  if (project.gradle.startParameter.taskNames.any { it.toLowerCase().contains('release') }) {
     implementation(name:'ipworks3ds_sdk_9625_deploy', ext:'aar')
  }
  else {
     implementation(name:'ipworks3ds_sdk_9625', ext:'aar')
  }
  implementation(name:'oppwa.mobile-7.11.0-release', ext:'aar')
  implementation "androidx.appcompat:appcompat:1.7.0"
  implementation "androidx.recyclerview:recyclerview:1.4.0"
  implementation "androidx.browser:browser:1.8.0"
  implementation "androidx.fragment:fragment-ktx:1.8.6"
  implementation "androidx.constraintlayout:constraintlayout:2.2.1"
  implementation "androidx.webkit:webkit:1.13.0"
  implementation "com.google.android.material:material:1.12.0"
  implementation "com.google.code.gson:gson:2.11.0"
  implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.8.7"
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"  // From node_modules

}